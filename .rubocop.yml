plugins:
  - rubocop-rake
  - rubocop-rspec

require:
  - ./.rubocop/cop/orn/multi_pair_hash_line_breaks.rb
  - ./.rubocop/cop/orn/empty_lines_between_collection_items.rb
  - ./.rubocop/cop/orn/multi_argument_line_breaks.rb
  - ./.rubocop/cop/orn/chain_below_multiline_call.rb

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "bin/**/*"
    - "vendor/**/*"
    - "tmp/**/*"
    # Dummy app used only as a sandbox system-test fixture, not orn source.
    - "spec/system/fixtures/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes
  Exclude:
    # Bundled detection manifests are regex-heavy data: single quotes keep the
    # backslashes literal (double quotes would reinterpret \s, \d, \b, ...).
    - "lib/orn/detect/manifests.rb"

# The bundled manifest data has long inline gate rows that do not wrap cleanly.
Layout/LineLength:
  Max: 120
  Exclude:
    - "lib/orn/detect/manifests.rb"

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Indentation: continuation lines step in one level (2 spaces) rather than
# aligning under the first argument, chained receiver, or opening delimiter.
# Rationale: renaming a method/variable then causes the smallest possible
# diff (no re-alignment of the lines below it), and there are fewer distinct
# indentation columns to track visually.
Layout/ArgumentAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/ParameterAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/FirstArgumentIndentation:
  EnforcedStyle: consistent

Layout/FirstArrayElementIndentation:
  EnforcedStyle: consistent

Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

# Enforce that module inclusions (include/extend/prepend) and constants are
# declared at the top of a class/module body, before its methods, so constants
# are never buried mid-class. Class methods (`def self.x`) and the initializer
# are intentionally omitted from the order: this codebase groups class methods
# by role (factories near the top, pure free-function helpers near the bottom),
# so only the constants-first rule is enforced, leaving method grouping free.
Layout/ClassStructure:
  Enabled: true
  ExpectedOrder:
    - module_inclusion
    - constants
    - public_methods
    - protected_methods
    - private_methods

# Hashes with more than one key/value pair break one pair per line, whether
# braced literals or braceless keyword arguments. The custom cop inserts the
# line breaks; the Layout cops below then put the first element after the
# opening delimiter on its own line and keep every element on its own line
# once a hash or call spans multiple lines.
Orn/MultiPairHashLineBreaks:
  Enabled: true

# A multiline hash, array, or keyword-argument list reads as one block:
# no blank lines between its items. Comment lines between items are fine,
# and blank lines inside heredoc items are untouched. The bundled manifest
# data keeps its blank lines: they group each entry's fields.
Orn/EmptyLinesBetweenCollectionItems:
  Enabled: true
  Exclude:
    - "lib/orn/detect/manifests.rb"

# Calls with more than two arguments break one argument per line. The
# allowed methods are CLI wrappers whose arguments are shell words: read
# as a command line, they stay inline at any count.
Orn/MultiArgumentLineBreaks:
  Enabled: true
  MaxArgsOnOneLine: 2
  AllowedMethods:
    - tmux_exec
    - sbx_exec
    - git_run
    - output

# A chained call must not start a new line below a multiline call or
# literal; assign the receiver to a named variable first. Chaining on the
# closing delimiter line (`).entries`) and fluent chains stay legal.
# No autocorrect: the variable name needs a human.
Orn/ChainBelowMultilineCall:
  Enabled: true

Layout/FirstHashElementLineBreak:
  Enabled: true

Layout/MultilineHashKeyLineBreaks:
  Enabled: true

Layout/FirstMethodArgumentLineBreak:
  Enabled: true

Layout/MultilineMethodArgumentLineBreaks:
  Enabled: true

# Class-level documentation is not mandatory; we comment where the intent
# is not obvious from the code.
Style/Documentation:
  Enabled: false

# Specs are long, readable example blocks; the gemspec is a manifest.
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

# Multiline hashes and calls are one statement; the one-pair-per-line hash
# style makes them tall, so length cops count them as one line.
Metrics/MethodLength:
  Max: 20
  CountAsOne:
    - hash
    - method_call
  Exclude:
    - "spec/**/*"

# Config normalizers map many fields and are call-heavy but flat; the bump
# fits them. Test setup is call-heavy too, so specs are exempt.
Metrics/AbcSize:
  Max: 23
  Exclude:
    - "spec/**/*"

# Detailed formatters and command classes run long; the deep Config namespace
# (value types, validation, normalization, loading) is exempt entirely, as are
# the TUI app classes, which are large single state/action classes.
Metrics/ClassLength:
  Max: 150
  CountAsOne:
    - hash
    - method_call
  Exclude:
    - "lib/orn/config/**/*"
    - "lib/orn/tui/app.rb"
    - "lib/orn/tui/global_app.rb"

# Deep single-responsibility modules (e.g. Symlink) run long. Sandbox is a
# single large module (lifecycle, ports, build, doctor) and is exempt
# entirely, like the Config namespace; the detect manifest engine and its
# bundled data are likewise a single large module.
Metrics/ModuleLength:
  Max: 150
  CountAsOne:
    - hash
    - method_call
  Exclude:
    - "lib/orn/sandbox.rb"
    - "lib/orn/detect/manifest.rb"
    - "lib/orn/detect/manifests.rb"
    # The tmux bootstrap plus both event loops as one entry point.
    - "lib/orn/tui/bootstrap.rb"
    - "spec/**/*"

# x/y are the conventional names for cell coordinates in the TUI buffer, and
# fg/bg for its foreground/background colours, on top of the cop's built-in
# short-name allowances.
Naming/MethodParameterName:
  AllowedNames:
    - x
    - y
    - fg
    - bg
    - io
    - id
    - to
    - by
    - "on"
    - fn

# A single behavior often asserts several closely related facts about one
# result (e.g. the fields of a parsed config); fragmenting those into separate
# examples hurts readability. Larger groups use `:aggregate_failures`.
RSpec/MultipleExpectations:
  Max: 5

# Integration examples arrange real git repos or YAML fixtures; a handful of
# setup lines is expected, and a fixture heredoc counts as one line.
RSpec/ExampleLength:
  Max: 15
  CountAsOne:
    - heredoc
    - array
    - hash
    - method_call

# Prefer explicitly named splat arguments (*args) over anonymous forwarding.
Style/ArgumentsForwarding:
  Enabled: false

# Keyword arguments are self-documenting at the call site; this cop's
# readability concern is long positional lists, so keyword args are not counted.
Metrics/ParameterLists:
  CountKeywordArgs: false

# Action methods (delete_branch, delete_remote_branch, ...) intentionally
# return the underlying git success boolean; they are commands, not queries,
# so they are not named with a trailing '?'.
Naming/PredicateMethod:
  Enabled: false
