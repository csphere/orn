name: Lint
on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: true
      - run: bundle exec rubocop
      # docs/cli.md is generated from the CLI definitions; fail when the
      # checked-in copy is stale.
      - run: bundle exec rake docs
      - run: git diff --exit-code docs/cli.md
